spring:
  application:
    name: law4x-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/law4x
    username: law4x
    password: law4x_dev
    driver-class-name: org.postgresql.Driver

server:
  port: 8080

law4x:
  embedding:
    dashscope:
      enabled: ${DASHSCOPE_EMBEDDING_ENABLED:true}
      api-key: ${DASHSCOPE_API_KEY:sk-2a7e4c8417ef4ec486d4ea3215afc1ba}
      model-name: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
      dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1536}
  agentscope:
    enabled: ${LAW4X_AGENTSCOPE_ENABLED:true}
    agent-name: ${LAW4X_AGENTSCOPE_AGENT_NAME:law4x-rag-agent}
    workspace: ${LAW4X_AGENTSCOPE_WORKSPACE:.agentscope/law4x}
    default-user-id: ${LAW4X_AGENTSCOPE_DEFAULT_USER_ID:public-user}
    default-session-id: ${LAW4X_AGENTSCOPE_DEFAULT_SESSION_ID:law4x-web}
    stateful: ${LAW4X_AGENTSCOPE_STATEFUL:true}
    provider: ${LAW4X_AGENTSCOPE_PROVIDER:openai-compatible}
    model-name: ${LAW4X_AGENTSCOPE_MODEL:ark-code-latest}
    api-key: ${LAW4X_AGENTSCOPE_API_KEY:${ARK_API_KEY:ark-c283855c-da17-4601-9320-61123b0611c8-06cb6}}
    base-url: ${LAW4X_AGENTSCOPE_BASE_URL:${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/coding/v3}}
